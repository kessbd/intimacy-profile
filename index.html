<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Intimacy Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400;1,9..40,500&display=swap" rel="stylesheet">

<style>

/* RESET */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* VARIABLES */
:root {
  --off:    #faf7ff;
  --white:  #ffffff;
  --black:  #111111;
  --sans:   'DM Sans', Arial, Helvetica, sans-serif;
  --display:'Fredoka', sans-serif;

  --r1: #FF2D78;
  --r2: #FF7A35;
  --r3: #FFD600;
  --r4: #5FCF80;
  --r5: #38BFFF;
  --r6: #7B5EFF;
  --rainbow:      linear-gradient(90deg,  var(--r1), var(--r2), var(--r3), var(--r4), var(--r5), var(--r6));
  --rainbow-diag: linear-gradient(135deg, var(--r1), var(--r2), var(--r3), var(--r4), var(--r5), var(--r6));

  --border:       3px solid var(--black);
  --shadow:       4px 4px 0 var(--black);
  --shadow-lg:    7px 7px 0 var(--black);
  --shadow-card:  7px 7px 0 #7A3848;
}

/* BODY */
body {
  font-family: var(--sans);
  background-color: var(--off);
  background-image: radial-gradient(circle, rgba(0,0,0,0.13) 1.2px, transparent 1.2px);
  background-size: 22px 22px;
  min-height: 100vh;
  padding: 2rem 1rem 5rem;
  color: var(--black);
}

#app { max-width: 660px; margin: 0 auto; }

/* ANIMATIONS */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section-card { animation: slideIn 0.26s ease; }

/* RAINBOW HELPERS */
.rf {
  background: var(--rainbow);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.rainbow-divider {
  height: 3px;
  background: var(--rainbow);
  border-radius: 2px;
  margin: 1.4rem 0;
}

/* PROGRESS */
.progress-wrap { margin-bottom: 2rem; }

.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--sans);
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 0.5rem;
  color: #aaa;
}

.progress-bar {
  height: 16px;
  background: var(--white);
  border: var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.progress-fill {
  height: 100%;
  background: var(--rainbow);
  border-radius: 20px;
  transition: width 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ORNAMENTAL SYMBOL */
.sym {
  font-family: 'Segoe UI Symbol', 'Apple Symbols', 'Noto Sans Symbols', 'Symbola', serif;
  font-style: normal;
  font-weight: 400;
}

.section-sym {
  font-family: 'Segoe UI Symbol', 'Apple Symbols', 'Noto Sans Symbols', 'Symbola', serif;
  font-size: 2.4rem;
  line-height: 1;
  display: block;
  margin-bottom: 0.3rem;
  color: #7A3848;
}

.chip-sym {
  font-family: 'Segoe UI Symbol', 'Apple Symbols', 'Noto Sans Symbols', 'Symbola', serif;
}

/* SECTION HEADER */
.section-header {
  margin-bottom: 2rem;
  text-align: left;
}

.section-chip {
  display: inline-block;
  font-family: var(--sans);
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: #bbb;
  margin-bottom: 0.5rem;
}

.section-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: 3.2rem;
  line-height: 1;
  letter-spacing: -0.01em;
  margin-bottom: 0.35rem;
}

.star-mark {
  font-size: 0.32em;
  vertical-align: super;
  margin-left: 0.08em;
  line-height: 0;
}

.section-subtitle {
  font-family: var(--sans);
  font-size: 0.88rem;
  color: #888;
  font-style: italic;
  font-weight: 400;
}

/* QUESTION CARD */
.question {
  background: var(--white);
  border: var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow-card);
  padding: 1.4rem;
  margin-bottom: 1.4rem;
}

.question-label {
  font-family: var(--sans);
  font-size: 0.98rem;
  font-weight: 600;
  color: var(--black);
  margin-bottom: 0.4rem;
  line-height: 1.5;
}

.question-hint {
  font-family: var(--sans);
  font-size: 0.73rem;
  color: #aaa;
  margin-bottom: 0.75rem;
  font-style: italic;
}

.science-note {
  font-family: var(--sans);
  font-size: 0.7rem;
  color: #888;
  margin-bottom: 0.75rem;
  font-style: italic;
  font-weight: 400;
  border-left: 2.5px solid var(--r1);
  padding-left: 0.6rem;
  line-height: 1.55;
  opacity: 0.85;
}

/* TEXTAREA */
textarea {
  width: 100%;
  background: var(--off);
  border: var(--border);
  border-radius: 10px;
  color: var(--black);
  font-family: var(--sans);
  font-size: 0.92rem;
  font-weight: 400;
  line-height: 1.65;
  padding: 0.8rem;
  resize: vertical;
  min-height: 78px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.1s;
}

textarea:focus {
  outline: none;
  box-shadow: 5px 5px 0 var(--black);
}

textarea::placeholder { color: #bbb; font-style: italic; }

/* TAGS */
.tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }

.tag {
  background: var(--white);
  border: var(--border);
  border-radius: 20px;
  color: var(--black);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 0.78rem;
  font-weight: 700;
  padding: 0.3rem 0.82rem;
  box-shadow: 2px 2px 0 var(--black);
  transition: all 0.1s;
  user-select: none;
  line-height: 1.5;
}

.tag:hover {
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--black);
}

.tag.active {
  color: var(--black);
  font-weight: 800;
  background: linear-gradient(white, white) padding-box,
              var(--rainbow) border-box;
  border: 3px solid transparent;
  box-shadow: none;
  transform: translate(2px, 2px);
}

/* SLIDER */
.slider-wrap { padding: 0.2rem 0; }

.slider-labels {
  display: flex;
  justify-content: space-between;
  font-family: var(--sans);
  font-size: 0.7rem;
  color: #aaa;
  font-style: italic;
  margin-bottom: 0.65rem;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 12px;
  background: var(--off);
  border: var(--border);
  border-radius: 20px;
  outline: none;
  box-shadow: var(--shadow);
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--rainbow-diag);
  border: 2.5px solid var(--black);
  cursor: pointer;
  box-shadow: 2px 2px 0 var(--black);
  transition: transform 0.1s;
}

input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }

.slider-value-wrap { text-align: center; margin-top: 0.65rem; }

.slider-value {
  font-family: var(--sans);
  font-size: 0.78rem;
  font-weight: 800;
  color: var(--black);
  background: linear-gradient(white, white) padding-box,
              var(--rainbow) border-box;
  border: 2px solid transparent;
  border-radius: 20px;
  display: inline-block;
  padding: 0.18rem 1rem;
}

/* BUTTONS */
.btn {
  background: var(--white);
  border: var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
  color: var(--black);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 0.84rem;
  font-weight: 800;
  padding: 0.65rem 1.6rem;
  transition: all 0.08s;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  line-height: 1;
}

.btn:hover {
  transform: translate(-3px, -3px);
  box-shadow: 7px 7px 0 var(--black);
}

.btn:active {
  transform: translate(4px, 4px);
  box-shadow: 0 0 0 var(--black);
}

.btn-primary {
  background: var(--rainbow-diag);
  color: var(--white);
  border-color: var(--black);
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2.5rem;
  padding-top: 1.4rem;
}

/* INTRO */
.intro { padding: 0.5rem 0 2rem; text-align: left; }

.deco {
  font-size: 1.2rem;
  letter-spacing: 0.28em;
  color: #7A3848;
  margin: 0.5rem 0;
}

.intro-logo {
  font-family: var(--display);
  font-weight: 700;
  font-size: 5rem;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 0.2rem;
}

.intro-card {
  background: var(--white);
  border: var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow-card);
  padding: 1.6rem;
  margin: 1.2rem 0;
}

.intro-body {
  font-family: var(--sans);
  color: #555;
  font-size: 0.94rem;
  line-height: 1.85;
  font-weight: 400;
}

.name-label {
  font-family: var(--sans);
  font-weight: 800;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 0.55rem;
  display: block;
  color: #aaa;
}

.name-input {
  width: 100%;
  background: var(--off);
  border: var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow);
  color: var(--black);
  font-family: var(--sans);
  font-size: 1.05rem;
  font-weight: 600;
  padding: 0.75rem 1rem;
  transition: box-shadow 0.1s;
}

.name-input:focus {
  outline: none;
  box-shadow: 4px 4px 0 var(--r1);
}

.privacy-note {
  font-family: var(--sans);
  font-size: 0.68rem;
  color: #bbb;
  margin-top: 1rem;
  font-style: italic;
  text-align: center;
}

/* RAINBOW IDENTITY STRIPE */
.rainbow-stripe {
  height: 5px;
  background: var(--rainbow);
  border-radius: 3px;
  margin-bottom: 1.3rem;
}

/* COMPLETION */
.completion-banner {
  background: var(--white);
  border: var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow-card);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  text-align: left;
}

.completion-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: 2.8rem;
  line-height: 1;
  letter-spacing: -0.01em;
}

.completion-sub {
  font-family: var(--sans);
  font-size: 0.85rem;
  color: #888;
  margin-top: 0.4rem;
  font-style: italic;
}

.profile-actions {
  display: flex;
  gap: 0.7rem;
  flex-wrap: wrap;
  margin-top: 1.4rem;
}

/* VISUAL PROFILE */
.pv-wrap {
  background: var(--white);
  border: var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow-card);
  overflow: hidden;
  margin-bottom: 1.5rem;
}

.pv-header {
  background: var(--rainbow-diag);
  padding: 2rem 1.8rem 1.6rem;
}

.pv-header-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: 2.8rem;
  color: white !important;
  -webkit-text-fill-color: white !important;
  background: none;
  -webkit-background-clip: unset;
  background-clip: unset;
  line-height: 1;
  letter-spacing: -0.01em;
}

.pv-header-sub {
  font-family: var(--sans);
  font-size: 0.85rem;
  font-style: italic;
  color: rgba(255,255,255,0.8);
  margin-top: 0.4rem;
}

.pv-glance {
  padding: 1.4rem 1.6rem 0.6rem;
  border-bottom: var(--border);
}

.pv-glance-title {
  font-family: var(--sans);
  font-size: 0.68rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: #aaa;
  margin-bottom: 1rem;
}

.pv-bar-row {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  margin-bottom: 0.7rem;
}

.pv-bar-name {
  font-family: var(--sans);
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--black);
  min-width: 130px;
  flex-shrink: 0;
}

.pv-bar-track {
  flex: 1;
  height: 10px;
  border: 2px solid var(--black);
  border-radius: 20px;
  background: var(--off);
  overflow: hidden;
}

.pv-bar-fill {
  height: 100%;
  background: var(--rainbow);
  border-radius: 20px;
}

.pv-bar-val {
  font-family: var(--sans);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--black);
  min-width: 100px;
  text-align: right;
  flex-shrink: 0;
}

.pv-section-block {
  padding: 1.4rem 1.6rem;
  border-bottom: var(--border);
}

.pv-section-block:last-child {
  border-bottom: none;
}

.pv-section-head {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.8rem;
}

.pv-section-sym {
  font-family: 'Segoe UI Symbol', 'Apple Symbols', 'Noto Sans Symbols', 'Symbola', serif;
  font-size: 1.8rem;
  color: #7A3848;
  line-height: 1;
}

.pv-section-name {
  font-family: var(--display);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--black);
}

.pv-rainbow-divider {
  height: 3px;
  background: var(--rainbow);
  border-radius: 2px;
  margin-bottom: 1rem;
}

.pv-row {
  margin-bottom: 0.85rem;
}

.pv-row-label {
  font-family: var(--sans);
  font-size: 0.68rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #aaa;
  margin-bottom: 0.35rem;
}

.pv-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
}

.pv-chip {
  font-family: var(--sans);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--black);
  background: linear-gradient(white, white) padding-box,
              var(--rainbow) border-box;
  border: 2.5px solid transparent;
  border-radius: 20px;
  padding: 0.2rem 0.65rem;
  line-height: 1.5;
}

.pv-text-val {
  font-family: var(--sans);
  font-size: 0.88rem;
  font-style: italic;
  color: #555;
  line-height: 1.7;
}

.pv-footer {
  text-align: center;
  font-family: var(--sans);
  font-size: 0.72rem;
  font-style: italic;
  color: #aaa;
  padding: 1.2rem 1.6rem;
  border-top: var(--border);
}

/* PRINT */
@media print {
  body { background: white; padding: 0; }
  .nav, .profile-actions, .progress-wrap, .completion-banner { display: none; }
  .pv-wrap { box-shadow: none; border: 1px solid #ccc; }
}

/* MOBILE */
@media (max-width: 480px) {
  .intro-logo    { font-size: 3.6rem; }
  .section-title { font-size: 2.6rem; }
  .pv-bar-name   { min-width: 90px; font-size: 0.62rem; }
  .pv-bar-val    { min-width: 70px; font-size: 0.62rem; }
}
</style>
</head>

// URL SHARING
function encodeData(obj) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
}
function decodeData(str) {
  return JSON.parse(decodeURIComponent(escape(atob(str))));
}

// HELPERS
function findQuestion(id) {
  for (const s of SECTIONS) {
    if (!s.questions) continue;
    const q = s.questions.find(q => q.id === id);
    if (q) return q;
  }
  return null;
}

function sliderLabel(q, value) {
  const n = q.steps.length;
  const idx = Math.max(0, Math.min(Math.round((value / 100) * (n - 1)), n - 1));
  return q.steps[idx];
}

function sliderLabelById(id) {
  const q = findQuestion(id);
  const el = document.getElementById(id);
  return (q && el) ? sliderLabel(q, parseInt(el.value)) : '';
}

function sliderPct(value) {
  return Math.round((value / 100) * 100);
}

    app.innerHTML = renderProfile();

    document.getElementById('btn-copy-text').addEventListener('click', copyPlainText);

      `<span class="tag" data-qid="${q.id}" data-val="${opt.replace(/"/g,'&quot;')}" onclick="toggleTag(this)">${opt}</span>`
    ).join('');
    input = `<div class="tags">${tagHTML}</div>`;
  } else if (q.type === 'slider') {
    input = `
      <div class="slider-wrap">
        <div class="slider-labels"><span>${q.min}</span><span>${q.max}</span></div>
        <input type="range" id="${q.id}" min="0" max="100" value="50"
          oninput="document.getElementById('${q.id}-val').textContent = sliderLabelById('${q.id}')">
        <div class="slider-value-wrap">
          <span class="slider-value" id="${q.id}-val">${q.steps[2]}</span>
        </div>
      </div>
    `;
  }

  return `
    <div class="question">
      <div class="question-label">${q.label}</div>
      ${q.science ? `<div class="science-note">${q.science}</div>` : ''}
      ${q.hint    ? `<div class="question-hint">${q.hint}</div>`   : ''}
      ${input}
    </div>
  `;
}

// ANSWER MANAGEMENT
function saveAnswers(section) {
  section.questions.forEach(q => {
    if (q.type === 'textarea') {
      const el = document.getElementById(q.id);
      if (el) answers[q.id] = el.value;
    } else if (q.type === 'slider') {
      const el = document.getElementById(q.id);
      if (el) answers[q.id] = parseInt(el.value);
    }
  });
}

function restoreAnswers(section) {
  section.questions.forEach(q => {
    if (q.condition && !q.condition(answers)) return;
    if (q.type === 'textarea') {
      const el = document.getElementById(q.id);
      if (el && answers[q.id] !== undefined) el.value = answers[q.id];
    } else if (q.type === 'slider') {
      const el = document.getElementById(q.id);
      if (el && answers[q.id] !== undefined) {
        el.value = answers[q.id];
        const valEl = document.getElementById(`${q.id}-val`);
        if (valEl) valEl.textContent = sliderLabelById(q.id);
      }
    } else if (q.type === 'tags') {
      const saved = answers[q.id] || [];
      document.querySelectorAll(`.tag[data-qid="${q.id}"]`).forEach(tag => {
        if (saved.includes(tag.dataset.val)) tag.classList.add('active');
      });
    }
  });
}

function toggleTag(el) {
  el.classList.toggle('active');
  const qid = el.dataset.qid;
  const val = el.dataset.val;
  if (!answers[qid]) answers[qid] = [];
  const idx = answers[qid].indexOf(val);
  if (idx === -1) answers[qid].push(val);
  else answers[qid].splice(idx, 1);
}

// SHARE ACTIONS
function copyPlainText() {
  const text = generateProfileText();
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy-text');
    const orig = btn.textContent;
    btn.textContent = '‚úì Copied!';
    setTimeout(() => btn.textContent = orig, 2200);
  });
}

function shareAsLink() {
  const encoded = encodeData(answers);
  const url = window.location.href.split('#')[0] + '#profile=' + encoded;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('btn-share');
    const orig = btn.textContent;
    btn.textContent = '‚úì Link Copied!';
    setTimeout(() => btn.textContent = orig, 2200);
  });
}

function downloadAsImage() {
  const el = document.getElementById('pv-content');
  const btn = document.getElementById('btn-img');
  btn.textContent = 'Generating...';
  html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
    const name = (answers['name'] || 'my').toLowerCase().replace(/\s+/g,'_');
    const link = document.createElement('a');
    link.download = name + '_intimacy_profile.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.textContent = 'Download Image';
  });
}

}
